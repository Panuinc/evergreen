services:
  evergreen:
    build: .
    container_name: evergreen
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local

  bc-sync:
    image: alpine:3.20
    container_name: evergreen-bc-sync
    restart: unless-stopped
    depends_on:
      - evergreen
    env_file:
      - .env.local
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl
        echo "BC Sync cron started — incremental sync every 5 minutes"
        while true; do
          sleep 300
          echo "[$(date)] Triggering BC incremental sync..."
          curl -sf -H "Authorization: Bearer $${CRON_SECRET}" \
            "http://evergreen:3000/api/sync/bc" \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            --max-time 290 || echo "[$(date)] BC sync failed"
        done

  followup-cron:
    image: alpine:3.20
    container_name: evergreen-followup-cron
    restart: unless-stopped
    depends_on:
      - evergreen
    env_file:
      - .env.local
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl
        echo "Follow-up cron started — every 10 minutes"
        while true; do
          sleep 600
          echo "[$(date)] Processing pending follow-ups..."
          curl -sf -X POST -H "x-internal-secret: $${INTERNAL_API_SECRET}" \
            "http://evergreen:3000/api/marketing/omnichannel/followUp/process" \
            -w "HTTP %{http_code} in %{time_total}s\n" \
            --max-time 60 || echo "[$(date)] Follow-up processing failed"
        done

  forthtrack-sync:
    image: alpine:3.20
    container_name: evergreen-forthtrack-sync
    restart: unless-stopped
    depends_on:
      - evergreen
    env_file:
      - .env.local
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl
        echo "ForthTrack GPS sync cron started — every 1 minute"
        while true; do
          sleep 60
          echo "[$(date)] Triggering ForthTrack sync..."
          curl -sf -H "Authorization: Bearer $${CRON_SECRET}" \
            "http://evergreen:3000/api/sync/forthtrack" \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            --max-time 30 || echo "[$(date)] ForthTrack sync failed"
        done
