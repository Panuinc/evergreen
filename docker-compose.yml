services:
  go-api:
    build: ./evergreen-api
    container_name: evergreen-api
    restart: unless-stopped
    env_file:
      - .env.local
    # Cron jobs (BC sync, ForthTrack, follow-up) are built into the Go binary
    # No separate cron containers needed

  nextjs:
    build: .
    container_name: evergreen-web
    restart: unless-stopped
    env_file:
      - .env.local

  nginx:
    image: nginx:alpine
    container_name: evergreen-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - go-api
      - nextjs
