services:
  evergreen:
    build: .
    container_name: evergreen
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local

  bc-sync:
    image: alpine:3.20
    container_name: evergreen-bc-sync
    restart: unless-stopped
    depends_on:
      - evergreen
    env_file:
      - .env.local
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl
        echo "BC Sync cron started — every hour at :00"
        while true; do
          # รอจนถึงต้นชั่วโมงถัดไป
          MIN=$(date +%M)
          SEC=$(date +%S)
          WAIT=$(( (60 - MIN) * 60 - SEC ))
          if [ $$WAIT -le 0 ]; then WAIT=3600; fi
          echo "[$(date)] Next sync in $${WAIT}s (at next :00)"
          sleep $$WAIT
          echo "[$(date)] Triggering BC sync..."
          curl -sf -H "Authorization: Bearer $${CRON_SECRET}" \
            "http://evergreen:3000/api/sync/bc" \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            --max-time 290 || echo "[$(date)] Sync failed"
        done
